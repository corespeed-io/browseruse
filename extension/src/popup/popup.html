<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: #ecfdf5;
      color: #065f46;
    }
    .status.disconnected {
      background: #fef2f2;
      color: #991b1b;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #10b981; }
    .dot.red { background: #ef4444; }
    .field {
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
    }
    .field input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .version {
      text-align: center;
      color: #9ca3af;
      font-size: 11px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>browseruse</h1>
  </div>

  <div id="status" class="status disconnected">
    <span id="dot" class="dot red"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="field">
    <label>Server URL</label>
    <input id="urlInput" type="text" value="ws://127.0.0.1:9876/ws" spellcheck="false">
  </div>

  <div class="actions">
    <button id="saveBtn" class="btn btn-primary">Save</button>
    <button id="reconnectBtn" class="btn btn-secondary">Reconnect</button>
  </div>

  <div class="version" id="version"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
