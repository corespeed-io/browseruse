name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14      # Apple Silicon
            arch: arm64
          - runner: macos-13      # Intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile repl.ts into standalone binary
        run: bun build --compile src/repl.ts --outfile browseruse-repl

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="browseruse-repl-${VERSION}-darwin-${{ matrix.arch }}.tar.gz"
          tar czf "$TARBALL" browseruse-repl
          shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: browseruse-repl-darwin-${{ matrix.arch }}
          path: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Combine checksums
        run: cat *.sha256 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            browseruse-repl-*.tar.gz
            checksums.txt
