name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon — cross-compiles x64 via --target
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile repl.ts (arm64 native + x64 cross-compile)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # arm64 (native)
          bun build --compile src/repl.ts --outfile browseruse-repl
          tar czf "browseruse-repl-${VERSION}-darwin-arm64.tar.gz" browseruse-repl
          rm browseruse-repl

          # x64 (cross-compile)
          bun build --compile --target=bun-darwin-x64 src/repl.ts --outfile browseruse-repl
          tar czf "browseruse-repl-${VERSION}-darwin-x64.tar.gz" browseruse-repl
          rm browseruse-repl

      - name: Generate checksums
        run: shasum -a 256 browseruse-repl-*.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            browseruse-repl-*.tar.gz
            checksums.txt
