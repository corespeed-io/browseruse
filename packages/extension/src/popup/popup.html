<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: #ecfdf5;
      color: #065f46;
    }
    .status.disconnected {
      background: #fef2f2;
      color: #991b1b;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #10b981; }
    .dot.red { background: #ef4444; }
    .info {
      padding: 10px 12px;
      border-radius: 8px;
      background: #f9fafb;
      margin-bottom: 12px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
    .info .label {
      font-weight: 500;
      color: #374151;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .info-row + .info-row {
      margin-top: 4px;
    }
    .note {
      padding: 8px 12px;
      border-radius: 8px;
      background: #fffbeb;
      color: #92400e;
      font-size: 11px;
      line-height: 1.4;
      margin-bottom: 12px;
    }
.version {
      text-align: center;
      color: #9ca3af;
      font-size: 11px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>browseruse</h1>
  </div>

  <div id="status" class="status disconnected">
    <span id="dot" class="dot red"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="info">
    <div class="info-row">
      <span class="label">Debugger tabs</span>
      <span id="attachedCount">0</span>
    </div>
  </div>

  <div class="note">
    The debugger shows a yellow warning bar on attached tabs. This is expected and required for full CDP access.
  </div>

  <div class="version" id="version"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
